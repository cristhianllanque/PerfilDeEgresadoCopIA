site_name: Documentación CopIA
site_description: Documentación oficial del proyecto CopIA
site_author: Equipo CopIA

theme:
  name: material
  language: es
  features:
    - navigation.tabs
    - navigation.sections
    - navigation.expand
    - toc.integrate
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro

nav:
  - Inicio: index.md
  - Ingeniería de Software:
    - Diseño Arquitectónico: arquitectura.md
    - Diagramas de Componentes: componentes.md
  - Infraestructura:
    - Diagramas de Despliegue: despliegue.md
